id: 001_fix_404_page
schema_version: 1
description: |
  Patch the http_routing.404 view (id 257 on bicc-xerxes) so the friendly
  branded 404 page renders for any nonexistent URL — covers expired/unpublished
  job pages, deleted records, and arbitrary broken links. Theme classes inherit
  each website's brand automatically, so the same arch_db works across all BICC
  and IGEBC websites.
author: tj
operations:
  - type: update_view
    key: http_routing.404
    arch_file: http_routing_404.xml
    backup: true
