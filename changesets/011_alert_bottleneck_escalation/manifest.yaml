id: 011_alert_bottleneck_escalation
schema_version: 1
description: |
  Daily 8 AM PHT cron. Identifies applicants stuck in Stage 10 (Passed
  Assessment) for over 48h and emails the HR Recruitment Manager group
  a digest so they advance or refuse the applicants manually.

  Read-only on applicants — does not mutate any records. Group-based
  notification (no hardcoded recipient emails). HTML rendered via
  mail.mail (message_notify would escape HTML in SaaS safe_eval).

author: ai

operations:
  - type: create_server_action
    xml_id: bicc_recruitment.bottleneck_escalation
    name: "BICC v5: Bottleneck Escalation (daily)"
    model: hr.applicant
    code_file: bottleneck_escalation.py

  - type: create_cron
    xml_id: bicc_recruitment.cron_bottleneck_escalation
    name: "BICC v5: Bottleneck Escalation (daily)"
    model: hr.applicant
    code_file: bottleneck_escalation.py
    interval_number: 1
    interval_type: days
    nextcall: "2026-05-13 00:00:00"
