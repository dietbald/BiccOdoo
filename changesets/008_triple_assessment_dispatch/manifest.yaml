id: 008_triple_assessment_dispatch
schema_version: 1
description: |
  Stage-7 (Assessment Sent) entry handler. When an applicant enters Stage
  7, generates per-candidate token URLs for the job's three assessments
  and emails a single bundle. Skips any assessment the candidate already
  completed in a prior application (matched by email_from).

  Three assessments per job: Technical (native hr.job.survey_id), Logical
  (hr.job.x_studio_logical_assessment), Emotional
  (hr.job.x_studio_emotional_assessment). Latter two are custom Studio
  fields that already exist on every target env.

  Ships the Triple Assessment Bundle template, the dispatch SA, the
  stage-write automation, and the recruiter "Resend Assessment Bundle"
  button on the hr.applicant Action menu.

  model_id=662 (hr.applicant ir.model).

author: ai
allow_generic_records: true

operations:
  - type: create_record
    xml_id: bicc_recruitment.tpl_triple_assessment_bundle
    model: mail.template
    values:
      name: "Recruitment: Triple Assessment Bundle"
      model_id: 662
      subject: "Next step: assessments for {{ object.job_id.name }}"
      email_from: "{{ object.company_id.x_studio_short_name }} <{{ object.company_id.alias_domain_id.default_from_email }}>"
      email_to: "{{ object.email_from }}"
      lang: "{{ object.partner_id.lang }}"
      auto_delete: false
      body_html: |
        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;background-color:#f2f2f2;margin:0;padding:0;">
          <tbody>
            <tr>
              <td align="center" style="padding:20px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="border-collapse:collapse;max-width:600px;background-color:#ffffff;color:#101820;font-family:'Roboto',sans-serif;font-size:13px;line-height:1.6;">
                  <tbody>
                    <tr>
                      <td style="padding:20px;">
                        <p style="margin:0;padding:0;font-size:13px;">
                          Hi <t t-out="object.partner_name or 'there'"/>,
                          <br/><br/>
                          Great news. You've passed the initial screening for the <b><t t-out="object.job_id.name or 'open'"/></b> position. Congratulations.
                          <br/><br/>
                          To continue with the process, we need you to complete the following assessments:
                        </p>
                        <t t-out="ctx.get('assessment_links', '')"/>
                        <p style="margin:0;padding:0;font-size:13px;">
                          <br/>
                          <b>Note:</b> Some assessments may have been skipped if you already completed them in a previous application with us.
                          <br/><br/>
                          Please complete these within the next few days to keep your application active. If you need any help, just reply to this email.
                          <br/><br/>
                          Thanks.
                          <br/><br/>
                          Best regards,<br/>
                          <t t-out="object.company_id.name or 'Our Company'"/> Recruitment Team<br/>
                          <a t-att-href="object.company_id.website" style="text-decoration:none;color:#374151;">
                            <t t-out="object.company_id.website"/>
                          </a>
                        </p>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>

  - type: create_server_action
    xml_id: bicc_recruitment.triple_assessment_dispatch
    name: "BICC v5: Triple Survey Dispatch"
    model: hr.applicant
    code_file: triple_assessment_dispatch.py

  - type: create_automated_action
    xml_id: bicc_recruitment.automation_triple_assessment_dispatch
    name: "BICC v5: Triple Survey Dispatch (stage → Assessment)"
    model: hr.applicant
    trigger: on_write
    code_file: triple_assessment_dispatch.py

  - type: create_server_action
    xml_id: bicc_recruitment.resend_assessment_bundle
    name: "BICC v5: Resend Assessment Bundle (Button)"
    model: hr.applicant
    code_file: resend_assessment_bundle.py
    binding_model: hr.applicant
    binding_view_types: "form,list"
