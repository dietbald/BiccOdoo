id: 005_resume_gate
schema_version: 1
description: |
  Entry-point automation for new applicants. Fires on hr.applicant.on_create
  and runs three checks in sequence:

  1. Source detection — scans partner_name + email_from for keywords like
     "via Indeed" / "via LinkedIn" / "OnlineJobs.ph" and sets utm source
     accordingly. Cleans "via XXXX" suffix from the applicant name.
  2. Duplicate check — if the same (email, job) exists within a 30-day
     window, archives the new record and transfers attachments to the
     original if the original is still in Stage 1 with no resume.
  3. Resume gate — if the job's x_studio_resume_required is True and the
     applicant has zero attachments, emails the "Request for Resume"
     template and stamps x_studio_resume_request_date. Otherwise advances
     directly to Stage 2 (Qualification).

  Ships the template, the server action, and the on_create automation.
  The two custom fields the gate reads (hr.applicant.x_studio_resume_request_date
  and hr.job.x_studio_resume_required) already exist on every target
  env — on prod via Studio, on dev via changeset 002's initial push,
  on staging via the prod-clone — so we do NOT re-declare them here.

  Pure procedural script: the three helper functions in the original
  block 01 script were inlined to remove safe_eval closure risks.

author: ai
allow_generic_records: true

operations:
  - type: create_record
    xml_id: bicc_recruitment.tpl_resume_request
    model: mail.template
    values:
      name: "Recruitment: Request for Resume (Missing Attachment)"
      model_id: hr.applicant
      subject: "Your application for {{ object.job_id.name }}: resume needed"
      email_from: "{{ object.company_id.x_studio_short_name }} <{{ object.company_id.alias_domain_id.default_from_email }}>"
      email_to: "{{ object.email_from }}"
      lang: "{{ object.partner_id.lang }}"
      auto_delete: false
      body_html: |
        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;background-color:#f2f2f2;margin:0;padding:0;">
          <tbody>
            <tr>
              <td align="center" style="padding:20px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="border-collapse:collapse;max-width:600px;background-color:#ffffff;color:#101820;font-family:'Roboto',sans-serif;font-size:13px;line-height:1.6;">
                  <tbody>
                    <tr>
                      <td style="padding:20px;">
                        <p style="margin:0;padding:0;font-size:13px;">
                          Hi <t t-out="object.partner_name or 'there'"/>,
                          <br/><br/>
                          Thanks for your interest in the <b><t t-out="object.job_id.name or 'open'"/></b> position at <t t-out="object.company_id.name or 'Our Company'"/>!
                          <br/><br/>
                          We noticed your application came through without a resume or CV attached. To move forward, we'll need a copy of your updated resume.
                          <br/><br/>
                          Please reply to this email with your resume attached (PDF or Word format).
                          <br/><br/>
                          We look forward to reviewing your qualifications.
                          <br/><br/>
                          Best regards,<br/>
                          <t t-out="object.company_id.name or 'Our Company'"/> Recruitment Team<br/>
                          <a t-att-href="object.company_id.website" style="text-decoration:none;color:#374151;">
                            <t t-out="object.company_id.website"/>
                          </a>
                        </p>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>

  - type: create_server_action
    xml_id: bicc_recruitment.entry_resume_request
    name: "BICC v5: Entry Resume Request"
    model: hr.applicant
    code_file: entry_resume_request.py

  - type: create_automated_action
    xml_id: bicc_recruitment.automation_entry_resume_request_on_create
    name: "BICC v5: Entry Resume Request (on create)"
    model: hr.applicant
    trigger: on_create
    code_file: entry_resume_request.py
